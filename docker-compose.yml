services:
  # Grafana Alloy batches and processes traces sent to it, generating
  # auto-logs from those traces.
  # Includes Metrics, Logs, Traces and Profiles.
  alloy:
    image: grafana/alloy:latest
    ports:
      - "12347:12345"
      - "12348:12348"
      - "6832:6832"
      - "55679:55679"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy:/etc/alloy
    command: [
      "run",
      "--server.http.listen-addr=0.0.0.0:12345",
      "--stability.level=experimental",
      "/etc/alloy/config.alloy",
    ]
    networks:
      - znet

  # The Loki service stores logs sent to it, and takes queries from Grafana
  # to visualise those logs.
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - "./loki/loki.yaml:/etc/loki/loki.yaml"
    command: ["--pattern-ingester.enabled=true", "-config.file=/etc/loki/loki.yaml"]
    networks:
      - znet

  # The Grafana dashboarding server.
  grafana:
    image: grafana/grafana:latest
    volumes:
      - "./grafana/definitions:/var/lib/grafana/dashboards"
      - "./grafana/provisioning:/etc/grafana/provisioning"
    ports:
      - "3000:3000"
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=flameGraph traceqlSearch traceQLStreaming correlations metricsSummary traceqlEditor traceToMetrics traceToProfiles datatrails
      - GF_INSTALL_PLUGINS=grafana-lokiexplore-app,grafana-exploretraces-app,grafana-pyroscope-app
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    networks:
      - znet

  apache:
    container_name: apache
    hostname: apache
    image: httpd:2.4
    ports:
      - "80:80"
    volumes:
      - ./docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./symfony:/var/www/symfony
    depends_on:
      - symfony
    networks:
      - znet

  symfony:
    container_name: symfony
    hostname: symfony
    depends_on:
      postgresql:
        condition: service_started
    build:
      context: .
      dockerfile: ./docker/symfony/Dockerfile
    volumes:
        - ./symfony:/var/www/symfony:rw
    networks:
      - znet

  postgresql:
    container_name: postgresql
    hostname: postgresql
    image: postgis/postgis:17-master
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=symfony
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"
    networks:
      - znet

volumes:
  postgres-data:

networks:
  znet:
    ipam:
      config:
        - subnet: 192.168.39.0/24